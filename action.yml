name: "pip-audit scan"
description: "Run pip-audit on a Python project"

outputs:
  vuln_count:
    description: "Number of vulnerabilities found"
    value: ${{ steps.audit.outputs.vuln_count }}
  scan_status:
    description: "Final scan status"
    value: ${{ steps.audit.outputs.scan_status }}

inputs:
  python_version:
    description: "Python version to use"
    required: false
    default: "3.11"

  pip_audit_version:
    description: "Exact pip-audit version to install"
    required: false
    default: "2.7.3"

  working_directory:
    description: "Directory containing the dependency file"
    required: false
    default: "."

  requirements_file:
    description: "Requirements file path relative to working_directory"
    required: false
    default: "requirements.txt"

  format:
    description: "pip-audit output format"
    required: false
    default: "columns"

  report_file:
    description: "Optional file path to write the scan report"
    required: false
    default: ""

  fail_on_vuln:
    description: "Fail the action if vulnerabilities are found (fail-closed default for CI; set false for reporting-only)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        set -euo pipefail
        WD="${{ inputs.working_directory }}"
        if [ -z "$WD" ]; then
          echo "working_directory must be a non-empty relative path." >&2
          exit 1
        fi
        case "$WD" in
          /*)
            echo "working_directory must be relative (no leading slash): $WD" >&2
            exit 1
            ;;
        esac
        if [[ "$WD" =~ (^|/)\.\.(/|$) ]]; then
          echo "working_directory must not traverse parents (..): $WD" >&2
          exit 1
        fi
        if [ ! -d "$GITHUB_WORKSPACE/$WD" ]; then
          echo "working_directory not found or not a directory: $WD" >&2
          exit 1
        fi

        REQ="${{ inputs.requirements_file }}"
        if [ -z "$REQ" ]; then
          echo "requirements_file must be a non-empty relative path." >&2
          exit 1
        fi
        case "$REQ" in
          /*)
            echo "requirements_file must be relative (no leading slash): $REQ" >&2
            exit 1
            ;;
        esac
        if [[ "$REQ" =~ (^|/)\.\.(/|$) ]]; then
          echo "requirements_file must not traverse parents (..): $REQ" >&2
          exit 1
        fi
        if [ ! -f "$GITHUB_WORKSPACE/$WD/$REQ" ]; then
          echo "requirements_file not found: $WD/$REQ" >&2
          exit 1
        fi

        case "${{ inputs.format }}" in
          columns|json|cyclonedx-json|cyclonedx-xml|markdown)
            ;;
          *)
            echo "Unsupported format: ${{ inputs.format }}" >&2
            exit 1
            ;;
        esac

        case "${{ inputs.fail_on_vuln }}" in
          true|false)
            ;;
          *)
            echo "Unsupported fail_on_vuln value: ${{ inputs.fail_on_vuln }}. Use true or false." >&2
            exit 1
            ;;
        esac

        REPORT_FILE="${{ inputs.report_file }}"
        if [ -n "$REPORT_FILE" ]; then
          case "$REPORT_FILE" in
            /*)
              echo "report_file must be relative (no leading slash): $REPORT_FILE" >&2
              exit 1
              ;;
          esac
          if [[ "$REPORT_FILE" =~ (^|/)\.\.(/|$) ]]; then
            echo "report_file must not traverse parents (..): $REPORT_FILE" >&2
            exit 1
          fi
        fi

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install pip-audit
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail
        PV="${{ inputs.pip_audit_version }}"
        CF="${GITHUB_ACTION_PATH}/constraints/pip-audit-${PV}.txt"
        if [ -f "$CF" ]; then
          python -m pip install --disable-pip-version-check -q --require-hashes -r "$CF"
        else
          echo "::warning title=Supply chain::No hash constraints for pip-audit==${PV} (expected ${CF}). Using pip without --require-hashes. Run scripts/refresh-pip-constraints.sh after bumping the default version." >&2
          python -m pip install --disable-pip-version-check -q "pip-audit==${PV}"
        fi

    - name: Run pip-audit
      id: audit
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set -euo pipefail

        json_report="$(mktemp)"
        rendered_report=""

        if [ -n "${{ inputs.report_file }}" ] && [[ "${{ inputs.report_file }}" == */* ]]; then
          mkdir -p "$(dirname -- "${{ inputs.report_file }}")"
        fi

        cleanup() {
          rm -f "$json_report"
          if [ -n "$rendered_report" ]; then
            rm -f "$rendered_report"
          fi
        }
        trap cleanup EXIT

        set +e
        python -m pip_audit -r "${{ inputs.requirements_file }}" --format json --output "$json_report"
        audit_exit_code=$?
        set -e

        if [ ! -s "$json_report" ]; then
          echo "pip-audit did not produce a JSON report." >&2
          exit "${audit_exit_code:-1}"
        fi

        vuln_count="$(
          python -c "import json, sys; data = json.load(open(sys.argv[1], encoding='utf-8')); print(sum(len(dep.get('vulns', []) or dep.get('vulnerabilities', []) or []) for dep in data.get('dependencies', []) if isinstance(dep, dict)))" "$json_report"
        )"

        if [ "$vuln_count" -gt 0 ]; then
          scan_status="vulnerabilities_found"
        elif [ "$audit_exit_code" -eq 0 ]; then
          scan_status="clean"
        else
          scan_status="scanner_error"
        fi

        echo "vuln_count=$vuln_count" >> "$GITHUB_OUTPUT"
        echo "scan_status=$scan_status" >> "$GITHUB_OUTPUT"

        if [ "${{ inputs.format }}" = "json" ]; then
          if [ -n "${{ inputs.report_file }}" ]; then
            cp "$json_report" "${{ inputs.report_file }}"
          else
            cat "$json_report"
          fi
        else
          rendered_report="$(mktemp)"
          set +e
          python -m pip_audit -r "${{ inputs.requirements_file }}" --format "${{ inputs.format }}" --output "$rendered_report"
          rendered_exit_code=$?
          set -e

          if [ ! -s "$rendered_report" ]; then
            echo "pip-audit failed to generate the requested ${{ inputs.format }} report." >&2
            exit "${rendered_exit_code:-1}"
          fi

          if [ -n "${{ inputs.report_file }}" ]; then
            cp "$rendered_report" "${{ inputs.report_file }}"
          else
            cat "$rendered_report"
          fi
        fi

        if [ "$scan_status" = "scanner_error" ]; then
          echo "pip-audit failed due to a scanner or runtime error (exit code: $audit_exit_code)." >&2
          exit "${audit_exit_code:-1}"
        fi

        if [ "$vuln_count" -gt 0 ]; then
          echo "pip-audit found $vuln_count vulnerabilities." >&2
          if [ "${{ inputs.fail_on_vuln }}" = "true" ]; then
            exit 1
          fi
          echo "fail_on_vuln=false so the action will continue." >&2
          exit 0
        fi

        echo "No vulnerabilities found."
